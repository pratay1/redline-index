name: Continuous Integration
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/redline_index
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ci_placeholder
      CLERK_SECRET_KEY: sk_test_ci_placeholder
      CLERK_WEBHOOK_SIGNING_SECRET: whsec_ci_placeholder
    steps:
      - name: Check out source
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Validate Prisma schema
        run: npm run prisma:validate
      - name: Generate Prisma Client
        run: npm run prisma:generate
      - name: Check formatting
        run: npm run format:check
      - name: Lint
        run: npm run lint
      - name: Type-check
        run: npm run typecheck
      - name: Production build
        run: npm run build
